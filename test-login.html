<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        button {
            background: #5B4DFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #4839CC;
        }
        pre {
            background: #fff;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Test Login API - Topkets</h1>
    
    <div class="test-section">
        <h2>Test 1: Debug Login</h2>
        <p>Test dengan email: <strong><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="e9888d848087a99d8699828c9d9ac7808d">[email&#160;protected]</a></strong> / password: <strong>admin123</strong></p>
        <button onclick="testDebugLogin()">Test Debug Login</button>
        <pre id="debug-result">Hasil akan muncul di sini...</pre>
    </div>
    
    <div class="test-section">
        <h2>Test 2: Actual Login</h2>
        <p>Test login sebenarnya</p>
        <button onclick="testActualLogin()">Test Actual Login</button>
        <pre id="actual-result">Hasil akan muncul di sini...</pre>
    </div>
    
    <div class="test-section">
        <h2>Test 3: Check Session</h2>
        <button onclick="testCheckSession()">Check Session</button>
        <pre id="session-result">Hasil akan muncul di sini...</pre>
    </div>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
        const API_BASE = window.location.origin + '/topkets/api';
        
        async function testDebugLogin() {
            const resultEl = document.getElementById('debug-result');
            resultEl.textContent = 'Testing...';
            
            try {
                const response = await fetch(API_BASE + '/auth/login-debug.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: 'admin@topkets.id',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
                resultEl.className = data.success ? 'success' : 'error';
            } catch (error) {
                resultEl.textContent = 'Error: ' + error.message;
                resultEl.className = 'error';
            }
        }
        
        async function testActualLogin() {
            const resultEl = document.getElementById('actual-result');
            resultEl.textContent = 'Testing...';
            
            try {
                const response = await fetch(API_BASE + '/auth/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: 'admin@topkets.id',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
                resultEl.className = data.success ? 'success' : 'error';
            } catch (error) {
                resultEl.textContent = 'Error: ' + error.message;
                resultEl.className = 'error';
            }
        }
        
        async function testCheckSession() {
            const resultEl = document.getElementById('session-result');
            resultEl.textContent = 'Checking...';
            
            try {
                const response = await fetch(API_BASE + '/auth/check-session.php', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
                resultEl.className = data.success ? 'success' : 'error';
            } catch (error) {
                resultEl.textContent = 'Error: ' + error.message;
                resultEl.className = 'error';
            }
        }
    </script>
</body>
</html>
